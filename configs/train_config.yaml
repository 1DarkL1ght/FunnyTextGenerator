data_path: data/concatenated_anekdot_dataset.csv
train_batch_size: 16
val_batch_size: 32
train_size: 0.8
epochs: 100
lr: 2e-4
weight_decay: 1e-3
fp16: True
d_model: 1024
nhead: 16
dim_feedforward: 4096
reduction: sum
num_layers: 12
vocab_size: 50000
max_len: 150
model_dir: outputs/models
optim: AdamW
device: cuda
patience: 10
inference_size: 4
train_tokenizer: False
tokenizer_path: outputs/tokenizers/tokenizer.json
seed: 42
dropout: 0.1
word_dropout: 0.0 # for decoder
mask_p: 0.0
latent_dim: 64
tsne: 1
grad_accumulation_steps: 8
warmup_steps: 0.3 # in epochs
beta_max: 1.0
beta_anneal_steps: 50 # in epochs
beta_warmup_steps: 20 # in epochs
gaussian_nll: False
  
